startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      dagsterUrl:
        type: string
        description: "Base URL of your Dagster instance"
        default: "http://localhost:3000"
      dagsterApiToken:
        type: string
        description: "Dagster Cloud API token (leave empty for self-hosted)"
        default: ""
      readOnly:
        type: string
        description: "Set to 'false' to enable write tools (launch, terminate, reload)"
        default: "true"
  commandFunction: |-
    (config) => ({ command: 'uvx', args: ['dagster-mcp'], env: { DAGSTER_URL: config.dagsterUrl || 'http://localhost:3000', DAGSTER_API_TOKEN: config.dagsterApiToken || '', DAGSTER_READ_ONLY: config.readOnly || 'true' } })
