startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      dagsterUrl:
        type: string
        description: "Base URL of your Dagster instance (single-env mode)"
        default: "http://localhost:3000"
      dagsterApiToken:
        type: string
        description: "Dagster Cloud API token (leave empty for self-hosted)"
        default: ""
      dagsterExtraHeaders:
        type: string
        description: "JSON object of additional headers (e.g. {\"Authorization\":\"Bearer <token>\"})"
        default: ""
      dagsterEnvs:
        type: string
        description: "JSON object mapping env names to configs for multi-env mode (e.g. {\"prod\":{\"url\":\"https://...\",\"token\":\"...\"}})"
        default: ""
      dagsterDefaultEnv:
        type: string
        description: "Default environment name when using multi-env mode"
        default: ""
      readOnly:
        type: string
        description: "Set to 'false' to enable write tools (launch, terminate, reload)"
        default: "true"
  commandFunction: |-
    (config) => ({ command: 'uvx', args: ['dagster-mcp'], env: { DAGSTER_URL: config.dagsterUrl || 'http://localhost:3000', DAGSTER_API_TOKEN: config.dagsterApiToken || '', DAGSTER_EXTRA_HEADERS: config.dagsterExtraHeaders || '', DAGSTER_ENVS: config.dagsterEnvs || '', DAGSTER_DEFAULT_ENV: config.dagsterDefaultEnv || '', DAGSTER_READ_ONLY: config.readOnly || 'true' } })
